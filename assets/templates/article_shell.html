<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fb;">
  <article style="max-width:760px;margin:0 auto;padding:40px 24px;background:#ffffff;">
    <header style="margin-bottom:28px;">
      <h1 style="margin:0 0 12px;font-size:32px;line-height:1.35;color:#111827;">{{ title }}</h1>
      <p style="margin:0;font-size:16px;line-height:1.8;color:#475569;">{{ summary }}</p>
    </header>
    {{ body_html }}
  </article>
</body>
</html>
